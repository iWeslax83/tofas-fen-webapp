# Gitleaks v7 config — narrow the default ruleset to suppress chronic
# false positives so the CI secret-scan step is signal, not noise.
#
# Inherit the built-in ruleset.
title = "tofas-fen-webapp gitleaks config"

[[allowlist]]
description = "Skip third-party libraries — historic commits accidentally checked node_modules into git, and gitleaks v7 happily flags every README link in there."
paths = [
  '''node_modules/.*''',
  '''.*/node_modules/.*''',
]

[[allowlist]]
description = "Skip lockfiles — package-lock entries trip the URL-with-credentials rule when registry tarballs include `?token=` parameters."
paths = [
  '''package-lock\.json''',
  '''.*/package-lock\.json''',
  '''yarn\.lock''',
  '''.*/yarn\.lock''',
]

[[allowlist]]
description = "Skip vendored design mockups + generated docs."
paths = [
  '''docs/ui-mockups/.*''',
  '''docs/.*\.html''',
  '''openapi\.(yaml|json)''',
]

[[allowlist]]
description = "LinkedIn / GitHub profile URLs in markdown are not secrets — gitleaks' default URL-credentials regex over-matches markdown link parens."
regexes = [
  '''https://(www\.)?linkedin\.com/in/[A-Za-z0-9_-]+/?''',
  '''https://github\.com/[A-Za-z0-9_-]+/?''',
]
