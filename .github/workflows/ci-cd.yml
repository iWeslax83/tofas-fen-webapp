name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '18'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# I-H7: pin workflow permissions to the minimum needed. Individual jobs may
# widen this where they actually need to push packages or write security events.
permissions:
  contents: read

jobs:
  # Test Job
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:5.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:6.2
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install client dependencies
        run: |
          cd client
          npm ci

      - name: Install server dependencies
        run: |
          cd server
          npm ci

      - name: Run client type checking
        run: |
          cd client
          npm run type-check

      - name: Run server type checking
        run: |
          cd server
          npm run type-check

      - name: Run client linting
        run: |
          cd client
          npm run lint

      - name: Run server linting
        run: |
          cd server
          npm run lint

      - name: Run client tests
        run: |
          cd client
          npm run test:ci

      - name: Run server tests
        run: |
          cd server
          npm run test:ci

      - name: Build client
        run: |
          cd client
          npm run build

      - name: Check client bundle size
        run: |
          cd client
          npm run build:analyze || true
          # Check bundle sizes
          node -e "
            const fs = require('fs');
            const path = require('path');
            const distPath = path.join(__dirname, 'dist', 'assets');
            if (fs.existsSync(distPath)) {
              const files = fs.readdirSync(distPath);
              const jsFiles = files.filter(f => f.endsWith('.js'));
              let totalSize = 0;
              jsFiles.forEach(file => {
                const size = fs.statSync(path.join(distPath, file)).size;
                totalSize += size;
                const sizeKB = (size / 1024).toFixed(2);
                console.log(\`Bundle: \${file} - \${sizeKB} KB\`);
              });
              const totalKB = (totalSize / 1024).toFixed(2);
              console.log(\`Total bundle size: \${totalKB} KB\`);
              if (totalSize > 500 * 1024) {
                console.error('HATA: Bundle boyutu 500KB sınırını aşıyor!');
                process.exit(1);
              }
            }
          "

      - name: Build server
        run: |
          cd server
          npm run build

      - name: Upload client coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./client/coverage/lcov.info
          flags: client
          name: client-coverage

      - name: Upload server coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./server/coverage/lcov.info
          flags: server
          name: server-coverage

      - name: Check test coverage thresholds
        run: |
          # I-M4: use pure node for comparison. `bc` is not guaranteed on the
          # GitHub-hosted ubuntu image across releases, and even when present
          # it introduces a shell-quoting footgun. node -e is portable.
          check_coverage() {
            local name="$1" threshold="$2" file="coverage/coverage-summary.json"
            if [ ! -f "$file" ]; then
              echo "WARNING: $name coverage summary not found; skipping gate"
              return 0
            fi
            node -e "
              const cov = require('./$file').total.lines.pct;
              const threshold = Number('$threshold');
              console.log('$name lines coverage: ' + cov + '% (threshold ' + threshold + '%)');
              if (cov < threshold) { process.exit(1); }
            " || {
              echo "ERROR: $name coverage below threshold"
              exit 1
            }
          }
          (cd client && check_coverage Client 70)
          (cd server && check_coverage Server 80)

  # Security Audit
  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd client && npm ci
          cd ../server && npm ci

      # I-H8: hard gate on HIGH/CRITICAL production vulnerabilities.
      # Dev-only deps (test runners, type packages) are excluded via --omit=dev.
      - name: Run security audit
        run: |
          npm audit --omit=dev --audit-level=high
          cd client && npm audit --omit=dev --audit-level=high
          cd ../server && npm audit --omit=dev --audit-level=high

      - name: Run dependency review
        uses: actions/dependency-review-action@v4
        if: github.event_name == 'pull_request'

      # I-H8: Snyk was previously `continue-on-error: true`, turning the whole
      # scan into a warning. Keep it advisory only when no token is set, but
      # otherwise let it fail the build on HIGH severity findings.
      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        if: ${{ secrets.SNYK_TOKEN != '' }}
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
          project: ${{ github.repository }}

      # I-H9: the previous ZAP step targeted http://localhost:3001 but the
      # backend was never started in the runner, so it was a no-op that
      # reported success. Remove until a real staging target is wired up.

  # Build and Push Docker Images
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.event_name == 'push'
    # I-H7: scope permissions to exactly what this job needs.
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      # I-C8: build images locally first, scan with Trivy, then push only if
      # the scan is clean. Fails the build on HIGH/CRITICAL CVEs with a fix
      # available (unfixed CVEs are reported via SARIF but don't block).
      - name: Build client image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          load: true
          tags: client:scan
          # I-M5: mode=min to avoid filling GHA cache with layers we never reuse.
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Build server image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          load: true
          tags: server:scan
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Trivy scan — client image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: client:scan
          format: sarif
          output: trivy-client.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

      - name: Trivy scan — server image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: server:scan
          format: sarif
          output: trivy-server.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

      - name: Upload Trivy results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .

      - name: Push client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-client:${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

      - name: Push server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-server:${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

  # Deploy to Staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/develop'
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          # Add your staging deployment commands here
          # Example: kubectl apply -f k8s/staging/

      - name: Run integration tests
        run: |
          echo "Running integration tests against staging..."
          # Add integration test commands here

      - name: Notify deployment
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}

  # Deploy to Production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Deploying to production environment..."
          # Add your production deployment commands here
          # Example: kubectl apply -f k8s/production/

      - name: Run smoke tests
        run: |
          echo "Running smoke tests against production..."
          # Add smoke test commands here

      - name: Notify deployment
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}

  # Cleanup
  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()

    steps:
      - name: Clean up old images
        run: |
          echo "Cleaning up old Docker images..."
          # Add cleanup commands here
