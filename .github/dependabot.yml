# Dependabot configuration
#
# I-H17: supply-chain hardening for GitHub Actions and npm dependencies.
#
# Pinning every action to a commit SHA manually solves yesterday's problem
# (a maintainer silently re-tagging @v3 to a malicious commit) but creates
# tomorrow's: the SHA goes stale and nobody updates it. Dependabot is the
# right answer — it opens a PR whenever a tracked action or package gets a
# new release, so pinning to SHAs stays maintainable.
#
# If you'd rather pin by SHA right now, run:
#   gh api repos/<owner>/<repo>/commits/HEAD --jq .sha
# for each action referenced in .github/workflows/*.yml and replace the
# @vX tags.

version: 2
updates:
  # GitHub Actions — keep the actions/{checkout, setup-node, etc} current.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Istanbul
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(actions)'
    labels:
      - dependencies
      - github-actions
    # Group patch + minor bumps to avoid PR noise.
    groups:
      actions:
        patterns: ['*']
        update-types: [minor, patch]

  # npm — single entry for the whole workspace.
  #
  # This is an npm-workspaces monorepo with ONE root package-lock.json, so a
  # single `directory: /` config covers root + client + server. The previous
  # setup had three separate npm entries (/, /server, /client); the root one
  # also saw the workspace deps, so the same package (e.g. ws, axios) was
  # proposed twice — and because every runtime bump opened its own PR against
  # the single shared lockfile, those PRs conflicted with each other in a
  # cascade. Grouping production + development updates collapses each weekly
  # run into at most two lockfile-coherent PRs that merge cleanly.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Istanbul
    open-pull-requests-limit: 10
    commit-message:
      prefix: 'chore(deps)'
    labels:
      - dependencies
      - npm
    groups:
      # All runtime deps in one PR (one coherent lockfile change).
      production-dependencies:
        dependency-type: production
        update-types: [minor, patch]
      # All dev tooling in one PR.
      development-dependencies:
        dependency-type: development
        update-types: [minor, patch]
    # Ignore major bumps for runtime deps — opt into those manually.
    ignore:
      - dependency-name: '*'
        update-types: [version-update:semver-major]

  # Docker base images (server + client Dockerfiles)
  - package-ecosystem: docker
    directory: /server
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: 'chore(docker)'
    labels:
      - dependencies
      - docker

  - package-ecosystem: docker
    directory: /client
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: 'chore(docker)'
    labels:
      - dependencies
      - docker
