services:
  # MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: tofas-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?MONGO_PASSWORD environment variable is required}
      MONGO_INITDB_DATABASE: tofas-fen
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    ports:
      - '27017:27017'
    networks:
      - tofas-network
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend API
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: tofas-backend
    restart: unless-stopped
    environment:
      # NODE_ENV=staging (not production) because this single-box docker
      # deploy uses a standalone Mongo container, not a replica set, so
      # production's `w: majority` / TLS-required options don't fit.
      # Compose still requires ENCRYPTION_KEY via the ${ENCRYPTION_KEY:?}
      # guard below, so the security posture is unchanged.
      NODE_ENV: staging
      MONGODB_URI: mongodb://admin:${MONGO_PASSWORD:?MONGO_PASSWORD environment variable is required}@mongodb:27017/tofas-fen?authSource=admin
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET environment variable is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET environment variable is required}
      # B-C5: backend throws at startup in production if ENCRYPTION_KEY is
      # missing. Must be a dedicated 64-char hex value, not the JWT secret.
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY environment variable is required}
      # Local docker-compose Mongo has no TLS certs; disable TLS explicitly.
      # Override to "true" when deploying to a real cluster with a TLS-enabled
      # managed Mongo (Atlas, DocumentDB, etc).
      MONGODB_TLS: 'false'
      # One-time backward-compat migration for pre-weekOf evci docs. Fresh
      # databases don't need it; skip it to avoid connection-readiness races.
      SKIP_EVCI_MIGRATION: 'true'
      PORT: 3001
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      BCRYPT_ROUNDS: 12
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 100
    ports:
      - '3001:3001'
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - tofas-network
    volumes:
      # Named volume (not a bind mount) so docker can manage ownership for
      # the unprivileged nodejs UID (1001) inside the container. A bind
      # mount of ./logs would inherit the host user's UID and crash-loop
      # the server with EACCES on first log write.
      - backend_logs:/app/logs
    # I-H16: read-only root FS + no-new-privileges. Writable state lives in
    # the explicit volumes and tmpfs below.
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ['CMD', 'node', 'dist/health-check.js']
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: tofas-frontend
    restart: unless-stopped
    ports:
      # Container listens on 8080 (non-root nginx); expose as 3080 externally.
      # (Port 3000 is commonly occupied on dev machines by other apps.)
      - '${FRONTEND_HOST_PORT:-3080}:8080'
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - tofas-network
    environment:
      - VITE_API_URL=http://localhost:3001
      - VITE_WS_URL=ws://localhost:3001
    # I-H16: read-only root FS. Nginx needs writable /tmp (pid), cache, and
    # runtime dirs — mounted as tmpfs so they live in memory and vanish with
    # the container.
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m
      - /var/cache/nginx:rw,noexec,nosuid,size=64m
      - /var/run:rw,noexec,nosuid,size=8m
    security_opt:
      - no-new-privileges:true
    healthcheck:
      # nginx:alpine ships BusyBox wget, not curl
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8080/health']
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Load Balancer (Optional)
  nginx:
    image: nginx:alpine
    container_name: tofas-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - tofas-network
    profiles:
      - production

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: tofas-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - tofas-network
    environment:
      # REDISCLI_AUTH is the documented way to pass the password to redis-cli
      # without exposing it on argv, where it would leak into `ps` output,
      # `docker inspect`, and container logs. See I-C12 in CODE_REVIEW_REPORT.md.
      REDISCLI_AUTH: ${REDIS_PASSWORD:?REDIS_PASSWORD environment variable is required}
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD environment variable is required}
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local
  backend_logs:
    driver: local

networks:
  tofas-network:
    driver: bridge
