<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Çevrimdışı - Tofaş Fen Lisesi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #f0fdfa 0%, #ccfbf1 50%, #99f6e4 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #134e4a;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 480px;
    }
    .logo {
      width: 96px;
      height: 96px;
      margin-bottom: 1.5rem;
      border-radius: 1rem;
      box-shadow: 0 4px 12px rgba(15, 118, 110, 0.2);
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #0f766e;
    }
    p {
      font-size: 1rem;
      line-height: 1.6;
      color: #115e59;
      margin-bottom: 1.5rem;
    }
    button {
      padding: 0.75rem 2rem;
      background: #0f766e;
      color: #fff;
      border: none;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #115e59; }
  </style>
</head>
<body>
  <div class="container">
    <img src="/tofaslogo.png" alt="Tofaş Fen Lisesi" class="logo" />
    <h1>Çevrimdışı</h1>
    <p>İnternet bağlantınız yok gibi görünüyor. Lütfen bağlantınızı kontrol edip tekrar deneyiniz.</p>
    <button onclick="window.location.reload()">Tekrar Dene</button>
  </div>
</body>
</html>
