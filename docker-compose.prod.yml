# Production overrides for docker-compose.yml
services:
  # Backend with production optimizations
  backend:
    environment:
      # NOTE: docker compose merges `environment:` blocks wholesale, not
      # key-by-key. Every var defined in the base file MUST appear here too,
      # otherwise the override silently drops it.
      NODE_ENV: production
      MONGODB_URI: mongodb://admin:${MONGO_PASSWORD:?MONGO_PASSWORD environment variable is required}@mongodb:27017/tofas-fen?authSource=admin
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET environment variable is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET environment variable is required}
      # N-M9: ENCRYPTION_KEY MUST be present in the prod override; B-C5 makes
      # the backend fail-closed if it's missing.
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY environment variable is required}
      MONGODB_TLS: ${MONGODB_TLS:-false}
      SKIP_EVCI_MIGRATION: 'true'
      PORT: 3001
      # One hop: the `nginx` service in front of this container. See the base file.
      TRUST_PROXY_HOPS: ${TRUST_PROXY_HOPS:-1}
      CORS_ORIGIN: ${FRONTEND_URL:?FRONTEND_URL environment variable is required}
      # Read directly by the CSRF origin allowlist, the CSP connect-src, and the
      # password-reset email links — passing it only as CORS_ORIGIN is not enough.
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL environment variable is required}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD environment variable is required}@redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD environment variable is required}
      BCRYPT_ROUNDS: 13
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 100
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  # Frontend with production optimizations
  frontend:
    build:
      # Runtime `environment:` cannot reach a Vite bundle that was compiled
      # in the image. These have to be build args; see the base file.
      args:
        VITE_API_URL: ${BACKEND_URL:?BACKEND_URL environment variable is required}
        VITE_WS_URL: ${WS_URL:?WS_URL environment variable is required}
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.25'
        reservations:
          memory: 256M
          cpus: '0.1'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  # MongoDB with production optimizations
  mongodb:
    environment:
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  # Redis with production optimizations
  redis:
    # Compose replaces `command:` wholesale, so the base flags (appendonly +
    # requirepass) MUST be repeated here. Adds an eviction policy: the 256M
    # container cap below would otherwise let Redis hit default `noeviction`
    # and reject new writes/sessions (OOM) instead of dropping old keys.
    # maxmemory is set under the container limit to leave headroom for AOF
    # rewrite / fork copy-on-write overhead so Redis evicts before the cgroup
    # OOM-kills the container.
    command: >-
      redis-server --appendonly yes
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD environment variable is required}
      --maxmemory 200mb
      --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.1'
        reservations:
          memory: 128M
          cpus: '0.05'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  # Nginx with production optimizations
  nginx:
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.1'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
