apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secret
  namespace: tofas-fen-prod
type: Opaque
stringData:
  uri: "mongodb://admin:${MONGO_PASSWORD}@mongodb-service:27017/tofas-fen?authSource=admin"
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: tofas-fen-prod
type: Opaque
stringData:
  url: "redis://redis-service:6379"
---
apiVersion: v1
kind: Secret
metadata:
  name: jwt-secret
  namespace: tofas-fen-prod
type: Opaque
stringData:
  secret: "${JWT_SECRET}"
  refresh-secret: "${JWT_REFRESH_SECRET}"
---
apiVersion: v1
kind: Secret
metadata:
  name: email-secret
  namespace: tofas-fen-prod
type: Opaque
stringData:
  smtp-host: "${SMTP_HOST}"
  smtp-port: "${SMTP_PORT}"
  smtp-user: "${SMTP_USER}"
  smtp-pass: "${SMTP_PASS}"
---
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-secret
  namespace: tofas-fen-prod
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: UkVEQUNURUQ=
