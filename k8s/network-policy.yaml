# NetworkPolicies (I-C3)
#
# Default posture: deny-all for ingress and egress in the namespace, then
# explicitly allow the flows this app actually needs. This is the minimum
# required to prevent lateral movement — any compromised pod would otherwise
# have unrestricted access to every other pod and port in the cluster.
#
# Apply with: kubectl apply -f k8s/network-policy.yaml -n tofas-fen

# --- 1. Default deny for every pod in the namespace --------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: tofas-fen
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# --- 2. DNS egress (every pod needs kube-dns) --------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: tofas-fen
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# --- 3. Frontend ingress: ingress controller + cert-manager ACME HTTP-01 -----
#
# cert-manager's HTTP-01 solver pods live in the `cert-manager` namespace and
# need to reach the frontend on :8080 (well, the ACME challenge path it serves
# behind the ingress). Without this allow, TLS cert issuance silently fails.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-frontend
  namespace: tofas-fen
spec:
  podSelector:
    matchLabels:
      app: tofas-frontend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cert-manager
      ports:
        - protocol: TCP
          port: 8080

---
# --- 4. Backend ingress: frontend + ingress-nginx + Prometheus scraper -------
#
# Prometheus lives in the `monitoring` namespace and scrapes :3001/metrics.
# Blocking it would mean the alerts defined in monitoring/alerts.yml fire
# blind because the metrics silently vanish.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-to-backend
  namespace: tofas-fen
spec:
  podSelector:
    matchLabels:
      app: tofas-backend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: tofas-frontend
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 3001

---
# --- 5. Backend egress: MongoDB, Redis, SMTP, HTTPS --------------------------
# Adjust CIDR blocks / service names to match your actual data tier.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-egress
  namespace: tofas-fen
spec:
  podSelector:
    matchLabels:
      app: tofas-backend
  policyTypes:
    - Egress
  egress:
    # MongoDB (in-cluster) — adjust the selector if you use a managed service.
    - to:
        - podSelector:
            matchLabels:
              app: mongodb
      ports:
        - protocol: TCP
          port: 27017
    # Redis (in-cluster)
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    # Outbound HTTPS for Sentry, VAPID, SMTP (implicit STARTTLS), MEB API, etc.
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 587 # SMTP submission
        - protocol: TCP
          port: 465 # SMTPS
