# HSTS — included only inside the listen 443 server block. Sending it on the
# port-80 redirect would be semantically wrong; see snippets/security-headers.conf
# for context. Re-include this snippet in every TLS-side location block that
# uses add_header for caching/CORS, because nginx silently discards parent
# add_header directives whenever a child block declares any of its own.
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
