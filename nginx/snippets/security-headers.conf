# Repeated security headers — included in every location block that uses
# `add_header` for caching/CORS, because nginx silently discards parent
# `add_header` directives whenever a child block declares any of its own.
# See N-H7 in CODE_REVIEW_REPORT_2026-04-29.md.
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header X-Permitted-Cross-Domain-Policies "none" always;

# I-C4 hardening: script-src no longer carries 'unsafe-inline'. The
# Vite-built index.html only loads two external scripts (theme-init.js
# and the bundled module entry) — there are no inline <script> tags in
# either the source HTML or the production build, so removing this
# directive doesn't break anything but does close the inline-script XSS
# vector. Helmet's contentSecurityPolicy in server/src/index.ts and
# server/src/middleware/security.ts has been strict for scripts since
# the original hardening pass; this aligns the upstream proxy.
#
# style-src still carries 'unsafe-inline' because React's `style={{...}}`
# prop emits inline style attributes, and framer-motion writes runtime
# style attributes during animations. Closing that vector requires
# either nonce-based per-request CSP injection or a wholesale move off
# of inline-style-emitting libraries — tracked separately and out of
# scope for this PR.
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
