# Prometheus Configuration for Tofas Fen Webapp

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'tofas-fen'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# Load rules once and periodically evaluate them
rule_files:
  - "alerts.yml"

# Scrape configurations
scrape_configs:
  # Backend API metrics
  - job_name: 'tofas-fen-backend'
    static_configs:
      - targets: ['backend:9464']
        labels:
          service: 'backend'
          environment: 'production'
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Node.js metrics
  - job_name: 'nodejs'
    static_configs:
      - targets: ['backend:9464']
    metrics_path: '/metrics'

  # Redis metrics (if redis_exporter is available)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'redis'
    scrape_interval: 30s

  # MongoDB metrics (if mongodb_exporter is available)
  - job_name: 'mongodb'
    static_configs:
      - targets: ['mongodb-exporter:9216']
        labels:
          service: 'mongodb'
    scrape_interval: 30s

  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

