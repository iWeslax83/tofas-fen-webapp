# Prometheus Alert Rules for Tofas Fen Webapp

groups:
  - name: backend_alerts
    interval: 30s
    rules:
      # High error rate
      - alert: HighErrorRate
        expr: rate(http_request_errors_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'High error rate detected'
          description: 'Error rate is {{ $value }} errors/sec for the last 5 minutes'

      # High response time
      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'High response time detected'
          description: '95th percentile response time is {{ $value }}s'

      # High memory usage
      - alert: HighMemoryUsage
        expr: nodejs_memory_usage_bytes{type="heap_used"} / nodejs_memory_usage_bytes{type="heap_total"} > 0.9
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: 'High memory usage'
          description: 'Memory usage is above 90%'

      # Database connection issues — uses the `status` label on
      # db_queries_total. A dedicated db_query_errors_total counter was never
      # created in server/src/utils/metrics.ts (I-M8/M9 mismatch), so the
      # original alert was silently evaluating against an empty series and
      # could never fire.
      - alert: DatabaseConnectionIssues
        expr: rate(db_queries_total{status="error"}[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: 'Database connection issues'
          description: 'High rate of database query errors'

      # WebSocket connection issues
      - alert: WebSocketConnectionIssues
        expr: websocket_connections_active < 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: 'No active WebSocket connections'
          description: 'No active WebSocket connections for 10 minutes'

      # Low cache hit rate
      - alert: LowCacheHitRate
        expr: rate(cache_hits_total[5m]) / (rate(cache_hits_total[5m]) + rate(cache_misses_total[5m])) < 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: 'Low cache hit rate'
          description: 'Cache hit rate is below 50%'

  - name: business_alerts
    interval: 1m
    rules:
      # High number of failed auth attempts
      - alert: HighFailedAuthAttempts
        expr: rate(auth_attempts_total{status="failed"}[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'High number of failed authentication attempts'
          description: 'Rate of failed auth attempts is {{ $value }}/sec'
